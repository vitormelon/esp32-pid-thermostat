name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  native_tests:
    name: Native unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO + gcovr
        run: |
          python -m pip install --upgrade pip
          pip install platformio gcovr

      - name: Run unit tests (native)
        run: pio test -e native

      - name: Run tests with coverage instrumentation
        run: pio test -e native_coverage

      - name: Coverage summary
        run: |
          gcovr -r src/ \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --print-summary \
            --txt coverage.txt \
            --xml coverage.xml \
            --html-details --html=coverage_html/index.html \
            .pio/build/native_coverage
          echo "===== Coverage report ====="
          cat coverage.txt

      - name: Annotate job summary with coverage
        if: always()
        run: |
          {
            echo "## Coverage"
            echo ""
            echo '```'
            cat coverage.txt 2>/dev/null || echo "(coverage report not available)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html/
          retention-days: 14

      - name: Upload coverage XML (for codecov/badges)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  esp32_build:
    name: ESP32 firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp32-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-esp32-

      - name: Provide stub credentials.h
        run: |
          if [ ! -f include/credentials.h ]; then
            cp include/credentials.h.example include/credentials.h
          fi

      - name: Build firmware
        run: pio run -e esp32dev
