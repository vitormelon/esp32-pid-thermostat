; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_ignore = native_mocks
lib_deps =
    blynkkk/Blynk@^1.3.2
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    madhephaestus/ESP32Encoder@^0.10.1

; Testes nativos no host (sem ESP32). Roda com:
;   pio test -e native
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    +<control.cpp>
    +<state.cpp>
    +<timer_ctrl.cpp>
    +<autotune.cpp>
    +<safety.cpp>
    +<storage.cpp>
    +<display.cpp>
    +<encoder_logic.cpp>
build_flags =
    -std=gnu++11
    -DUNIT_TEST

; Roda os testes com instrumentação de coverage (gcov):
;   pio test -e native_coverage
;   gcovr -r src/ --print-summary --html-details coverage_html/index.html
;
; OBS: requer gcc real (Linux/CI). No macOS, Apple Clang não traz a runtime
; de profile (libgcov). Use o CI no GitHub Actions para coverage, ou instale
; gcc via Homebrew (brew install gcc) e ajuste PATH.
[env:native_coverage]
extends = env:native
build_flags =
    -std=gnu++11
    -DUNIT_TEST
    --coverage
    -O0
    -g
build_unflags = -O2 -O1 -O3
build_type = debug
; Garante que libgcov é linkada no programa final (PlatformIO não propaga
; --coverage automaticamente para o estágio de link).
extra_scripts = post:scripts/coverage_link.py
